[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# URL은 env.py에서 환경변수로 오버라이드됨
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/ai_server

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
