version: "3.9"
services:
  ai-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - model_cache:/app/model_cache
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - ds_ai_network

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_server
      POSTGRES_USER: ai_server
      POSTGRES_PASSWORD: ${PG_PASSWORD:-changeit}
    expose:
      - "5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_server"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ds_ai_network

volumes:
  pgvector_data:
  model_cache:

networks:
  ds_ai_network:
    driver: bridge
